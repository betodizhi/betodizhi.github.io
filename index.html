<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>官方入口发布页</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: #0a0e1a;
  font-family: 'Noto Sans SC', Arial, sans-serif;
  color: #fff;
  text-align: center;
  overflow-x: hidden;
}

/* ===== 动态背景 ===== */
.bg-animated {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(16, 185, 129, 0.08) 0%, transparent 60%),
    linear-gradient(180deg, #0a0e1a 0%, #0f172a 50%, #0a0e1a 100%);
}

.bg-animated::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.08) 0px, transparent 2px),
    radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.08) 0px, transparent 2px),
    radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.06) 0px, transparent 2px);
  background-size: 100px 100px, 150px 150px, 200px 200px;
  animation: starsMove 20s linear infinite;
}

@keyframes starsMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100px); }
}

/* ===== 顶部光效 ===== */
.top-glow {
  position: fixed;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 300px;
  background: radial-gradient(ellipse, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ===== 主容器 ===== */
.container {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 20px;
  padding-bottom: 100px; /* 给底部悬浮广告留空间 */
}

/* ===== 头部区域 ===== */
.header {
  padding: 50px 20px 20px;
  position: relative;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  background: rgba(34, 197, 94, 0.15);
  border: 1px solid rgba(34, 197, 94, 0.3);
  border-radius: 50px;
  font-size: 12px;
  color: #4ade80;
  margin-bottom: 20px;
  animation: pulse 2s ease-in-out infinite;
}

.badge::before {
  content: '';
  width: 8px;
  height: 8px;
  background: #22c55e;
  border-radius: 50%;
  box-shadow: 0 0 10px #22c55e;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

h1 {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}

.subtitle {
  color: #64748b;
  font-size: 14px;
  line-height: 1.6;
}

/* ===== 复制框 ===== */
.copy-section {
  margin: 25px auto;
  max-width: 340px;
}

.copy-label {
  font-size: 12px;
  color: #475569;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.copy-box {
  position: relative;
  padding: 14px 50px 14px 16px;
  background: rgba(15, 23, 42, 0.8);
  border: 1px solid rgba(56, 189, 248, 0.2);
  border-radius: 12px;
  font-size: 13px;
  color: #38bdf8;
  word-break: break-all;
  text-align: left;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.copy-box:hover {
  border-color: rgba(56, 189, 248, 0.5);
  box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
}

.copy-box .icon-link {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #38bdf8;
  opacity: 0.5;
  font-size: 14px;
}

.copy-btn {
  margin-top: 12px;
  padding: 12px 32px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.copy-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(34, 197, 94, 0.4);
}

.copy-btn:active {
  transform: translateY(0);
}

.copy-btn.copied {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
}

/* ===== 分割线 ===== */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 30px 20px;
  color: #475569;
  font-size: 12px;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.3), transparent);
}

/* ===== 卡片区域 ===== */
.card {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.06);
  margin: 0 0 20px;
  padding: 28px 20px;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
}

.card-title {
  font-size: 15px;
  font-weight: 700;
  color: #e2e8f0;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.card-title .icon {
  font-size: 18px;
}

/* ===== 按钮样式 ===== */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 10px auto;
  padding: 16px 20px;
  width: 100%;
  max-width: 300px;
  border-radius: 14px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s ease;
}

.btn:hover::before {
  left: 100%;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.btn .btn-icon {
  font-size: 18px;
}

.btn .btn-arrow {
  margin-left: auto;
  font-size: 14px;
  opacity: 0.6;
  transition: transform 0.3s ease;
}

.btn:hover .btn-arrow {
  transform: translateX(4px);
}

.btn1 { 
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
}
.btn1:hover { box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4); }

.btn2 { 
  background: linear-gradient(135deg, #10b981, #047857);
  box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
}
.btn2:hover { box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4); }

.btn3 { 
  background: linear-gradient(135deg, #f59e0b, #b45309);
  box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
}
.btn3:hover { box-shadow: 0 8px 30px rgba(245, 158, 11, 0.4); }

.btn4 { 
  background: linear-gradient(135deg, #ec4899, #be185d);
  box-shadow: 0 4px 20px rgba(236, 72, 153, 0.3);
}
.btn4:hover { box-shadow: 0 8px 30px rgba(236, 72, 153, 0.4); }

/* ===== 提示区域 ===== */
.notice {
  margin-top: 20px;
  padding: 14px 16px;
  background: rgba(250, 204, 21, 0.08);
  border: 1px solid rgba(250, 204, 21, 0.2);
  border-radius: 12px;
  font-size: 13px;
  color: #facc15;
  line-height: 1.6;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  text-align: left;
}

.notice .notice-icon {
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 1px;
}

/* ===== 底部 ===== */
.footer {
  margin-top: 30px;
  padding: 30px 20px 40px;
  font-size: 12px;
  color: #475569;
  line-height: 1.8;
}

.footer .heart {
  color: #ef4444;
  animation: heartbeat 1.5s ease-in-out infinite;
  display: inline-block;
}

@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

/* ===== 弹窗 ===== */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  padding: 14px 28px;
  background: rgba(15, 23, 42, 0.95);
  border: 1px solid rgba(34, 197, 94, 0.3);
  border-radius: 12px;
  color: #4ade80;
  font-size: 14px;
  font-weight: 500;
  backdrop-filter: blur(10px);
  z-index: 1000;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ===== 收藏提示遮罩 ===== */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(5px);
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.overlay.show {
  display: flex;
}

.modal {
  background: rgba(15, 23, 42, 0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 32px 24px;
  max-width: 340px;
  width: 100%;
  text-align: center;
  animation: modalIn 0.4s ease;
}

@keyframes modalIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.modal h3 {
  font-size: 18px;
  margin-bottom: 8px;
  color: #fff;
}

.modal p {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 20px;
  line-height: 1.6;
}

.modal-btn {
  padding: 12px 32px;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

.modal-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
}

/* ===== 底部悬浮广告栏（无关闭按钮） ===== */
.float-ad-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  padding: 8px 16px 12px;
}

.float-ad-inner {
  max-width: 480px;
  margin: 0 auto;
}

.float-ad-img {
  display: block;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.float-ad-img:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(59, 130, 246, 0.2);
}

.float-ad-img img {
  width: 100%;
  height: auto;
  display: block;
  max-height: 80px;
  object-fit: cover;
}

/* ===== 响应式 ===== */
@media (max-width: 480px) {
  h1 { font-size: 24px; }
  .card { padding: 24px 16px; }
  .btn { padding: 14px 16px; font-size: 14px; }
  .container { padding-bottom: 90px; }
  .float-ad-img img { max-height: 70px; }
}

/* ===== 入场动画 ===== */
.fade-in-up {
  opacity: 0;
  transform: translateY(30px);
  animation: fadeInUp 0.6s ease forwards;
}

.fade-in-up:nth-child(1) { animation-delay: 0.1s; }
.fade-in-up:nth-child(2) { animation-delay: 0.2s; }
.fade-in-up:nth-child(3) { animation-delay: 0.3s; }
.fade-in-up:nth-child(4) { animation-delay: 0.4s; }
.fade-in-up:nth-child(5) { animation-delay: 0.5s; }

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

<body>

<script>
function copyUrl() {
  const text = document.getElementById("urlBox").innerText.replace('🔗', '').trim();
  const btn = document.getElementById("copyBtn");
  const toast = document.getElementById("toast");

  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '<span>✅</span> 复制成功';
    toast.classList.add('show');

    setTimeout(() => {
      toast.classList.remove('show');
      btn.classList.remove('copied');
      btn.innerHTML = '<span>📋</span> 一键复制地址';
    }, 2500);
  }).catch(() => {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);

    btn.classList.add('copied');
    btn.innerHTML = '<span>✅</span> 复制成功';
    toast.classList.add('show');

    setTimeout(() => {
      toast.classList.remove('show');
      btn.classList.remove('copied');
      btn.innerHTML = '<span>📋</span> 一键复制地址';
    }, 2500);
  });
}

// 收藏提示弹窗
window.onload = function() {
  setTimeout(() => {
    document.getElementById("overlay").classList.add("show");
  }, 1200);
};

function closeModal() {
  document.getElementById("overlay").classList.remove("show");
}

// 点击遮罩关闭弹窗
document.getElementById("overlay").addEventListener('click', function(e) {
  if (e.target === this) {
    closeModal();
  }
});
</script>
